firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
let currentUser = null;

const logEl = document.getElementById('log');
function log(msg, cls){ logEl.innerHTML += '\n' + (cls?`<span class="${cls}">${msg}</span>`:msg); logEl.scrollTop = logEl.scrollHeight; }

auth.onAuthStateChanged(u => {
  currentUser = u;
  const st = document.getElementById('authState');
  if (u) {
    st.innerHTML = `Signed in as <b style="color:#6fd98f;">${u.email}</b>`;
    document.getElementById('seedBtn').disabled = false;
    document.getElementById('signInBtn').textContent = 'Signed in ✓';
  } else {
    st.textContent = 'Not signed in.';
    document.getElementById('seedBtn').disabled = true;
  }
});

function signIn(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e => log('Sign-in failed: ' + e.message, 'err'));
}

// Firestore REST value encoder
function toValue(v){
  if (v === null || v === undefined) return { nullValue:null };
  if (typeof v === 'boolean') return { booleanValue:v };
  if (typeof v === 'number') return Number.isInteger(v) ? { integerValue:String(v) } : { doubleValue:v };
  if (typeof v === 'string') return { stringValue:v };
  if (Array.isArray(v)) return { arrayValue:{ values:v.map(toValue) } };
  if (typeof v === 'object') return { mapValue:{ fields:toFields(v) } };
  return { stringValue:String(v) };
}
function toFields(obj){ const f={}; for (const [k,val] of Object.entries(obj)) f[k]=toValue(val); return f; }

function normalize(t){
  return Object.assign({
    metrics: { throughput:null, trt:null, tankTurns:null, utilization:null, lastAudit:null },
    ownerId: null, claimStatus: 'unclaimed',
  }, t);
}

async function seed(){
  if (!currentUser){ log('Sign in first.', 'err'); return; }
  document.getElementById('seedBtn').disabled = true;
  log('\n--- Seeding ' + NEW_TERMINALS.length + ' terminals ---', 'muted');
  const token = await currentUser.getIdToken();
  const base = `https://firestore.googleapis.com/v1/projects/${FIREBASE_CONFIG.projectId}/databases/${FIRESTORE_DB_ID}/documents`;
  let ok=0, fail=0;
  for (const t of NEW_TERMINALS){
    const doc = normalize(t);
    const mask = Object.keys(doc).map(k=>`updateMask.fieldPaths=${encodeURIComponent(k)}`).join('&');
    const url = `${base}/terminals/${t.id}?${mask}`;
    try {
      const res = await fetch(url, {
        method:'PATCH',
        headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+token },
        body: JSON.stringify({ fields: toFields(doc) }),
      });
      if (res.ok){ ok++; log(`✓ ${t.id} ${t.name}`, 'ok'); }
      else { fail++; const txt = await res.text(); log(`✗ ${t.id} ${t.name} — ${res.status}: ${txt.slice(0,120)}`, 'err'); }
    } catch(e){ fail++; log(`✗ ${t.id} ${t.name} — ${e.message}`, 'err'); }
  }
  log(`\nDone. ${ok} written, ${fail} failed.`, fail? 'err':'ok');
  if (ok) log('Now reload tankbazaar.com — it will load all terminals from Firestore.', 'muted');
  document.getElementById('seedBtn').disabled = false;
}
</script>
