[build]
  publish = "."
  [build.environment]
    # The Firebase web apiKey is public by design (it identifies the project and
    # is meant to ship in client code). Real security comes from Firestore rules
    # and Authorized Domains. Netlify's "smart" scanner flags it as a false
    # positive, so we disable smart detection. We do NOT list the key value here
    # (that would itself be flagged). Basic secret scanning stays on.
    SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# Single-page app: always serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self)"
